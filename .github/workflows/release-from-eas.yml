name: Create Release from EAS Build - DEPRECATED

# ⚠️ DEPRECATED - Use "Create Release from EAS Artifacts (Direct Links)" instead
# This workflow is kept for reference but no longer needed.
# The new workflow accepts artifact URLs directly, which is simpler and more reliable.

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: "EAS Build ID (leave empty to use latest finished build)"
        required: false
        default: ""

jobs:
  release:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
      
      - name: Install dependencies
        run: npm install -g eas-cli pnpm
      
      - name: Install project dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Verify EAS Token
        run: |
          echo "EAS_TOKEN is set: $([ -z "$EAS_TOKEN" ] && echo 'NO' || echo 'YES')"
          eas whoami
        env:
          EAS_TOKEN: ${{ secrets.EAS_TOKEN }}
      
      - name: Get latest EAS build (or use provided ID)
        id: build_info
        run: |
          if [ -z "${{ inputs.build_id }}" ]; then
            echo "Fetching latest finished Android build from EAS..."
            BUILD_DATA=$(eas build:list --platform android --status finished --limit 1 --json)
            BUILD_ID=$(echo "$BUILD_DATA" | jq -r '.[0].id')
            BUILD_NUMBER=$(echo "$BUILD_DATA" | jq -r '.[0].buildNumber')
          else
            BUILD_ID="${{ inputs.build_id }}"
            echo "Using provided build ID: $BUILD_ID"
            BUILD_DATA=$(eas build:list --platform android --status finished --json | jq ".[] | select(.id==\"$BUILD_ID\")")
            BUILD_NUMBER=$(echo "$BUILD_DATA" | jq -r '.buildNumber')
          fi
          
          echo "BUILD_ID=$BUILD_ID" >> $GITHUB_OUTPUT
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "Build found: $BUILD_ID (Build #$BUILD_NUMBER)"
        env:
          EAS_TOKEN: ${{ secrets.EAS_TOKEN }}
      
      - name: Download APK from EAS
        run: |
          echo "Downloading APK for build: ${{ steps.build_info.outputs.BUILD_ID }}"
          eas build:download \
            --id ${{ steps.build_info.outputs.BUILD_ID }} \
            --path ./app-release.apk
          
          if [ ! -f ./app-release.apk ]; then
            echo "Error: APK download failed"
            exit 1
          fi
          
          # Get file size for verification
          ls -lh ./app-release.apk
        env:
          EAS_TOKEN: ${{ secrets.EAS_TOKEN }}
      
      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(jq -r '.version' package.json)
          BUILD_NUMBER="${{ steps.build_info.outputs.BUILD_NUMBER }}"
          TAG="v${VERSION}"
          RELEASE_NAME="Release v${VERSION} (Build #${BUILD_NUMBER})"
          
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=$TAG" >> $GITHUB_OUTPUT
          echo "RELEASE_NAME=$RELEASE_NAME" >> $GITHUB_OUTPUT
          echo "Build timestamp: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
      
      - name: Create GitHub Release
        uses: actions/create-release@v1
        id: create_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          release_name: ${{ steps.version.outputs.RELEASE_NAME }}
          body: |
            ## Charter Keke Mobile App Release
            
            **Version:** ${{ steps.version.outputs.VERSION }}
            **Build Number:** ${{ steps.build_info.outputs.BUILD_NUMBER }}
            **EAS Build ID:** ${{ steps.build_info.outputs.BUILD_ID }}
            **Released at:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            
            ### Download APK
            - **File:** `app-${{ steps.version.outputs.VERSION }}.apk`
            - **Type:** Unsigned Debug APK for internal testing
            - **Format:** Android Package (APK)
            
            ### Installation
            ```bash
            adb install app-${{ steps.version.outputs.VERSION }}.apk
            ```
            
            ### What's Inside
            - Latest code from commit `${{ github.sha }}`
            - For internal testing & distribution only
            
            > **Note:** This is an unsigned debug APK. For production releases, signing credentials will be added to the build.
          draft: false
          prerelease: false
      
      - name: Upload APK to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./app-release.apk
          asset_name: app-${{ steps.version.outputs.VERSION }}.apk
          asset_content_type: application/vnd.android.package-archive
      
      - name: Release Summary
        run: |
          echo "✅ Release Created Successfully!"
          echo ""
          echo "📦 Release Details:"
          echo "   Tag: ${{ steps.version.outputs.TAG }}"
          echo "   Version: ${{ steps.version.outputs.VERSION }}"
          echo "   Build Number: ${{ steps.build_info.outputs.BUILD_NUMBER }}"
          echo "   EAS Build: ${{ steps.build_info.outputs.BUILD_ID }}"
          echo ""
          echo "📥 APK:"
          echo "   Name: app-${{ steps.version.outputs.VERSION }}.apk"
          echo "   Size: $(ls -lh ./app-release.apk | awk '{print $5}')"
          echo ""
          echo "🔗 Release URL:"
          echo "   ${{ steps.create_release.outputs.html_url }}"
